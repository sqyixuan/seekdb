syntax = "proto3";
package storageservice;

service StorageService {
  rpc copy_ls_info(CopyLSInfoReq) returns (CopyLSInfoRes);
  // Server streaming RPC: fetch tablet info stream
  rpc fetch_tablet_info(FetchTabletInfoReq) returns (stream FetchTabletInfoRes);
}

message CopyLSInfoReq {
  bytes buf = 1;
  uint64 size = 2;
}

message CopyLSInfoRes {
  bytes buf = 1;
  uint64 size = 2;
}

message FetchTabletInfoReq {
  bytes buf = 1;
  uint64 size = 2;
}

message FetchTabletInfoRes {
  bytes buf = 1;
  uint64 size = 2;
}
