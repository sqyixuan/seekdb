default_values:
  host: &host 127.0.0.1 #127.0.0.1
  path: &path ~/

deploy_config:
  cluster:
    name: vos 
    hosts1: *host
    proxy_hosts: *host
    proxy_port: 2828
    proxy_config_url:
    svr_port:
    mysql_port: 
    config_url:
    path : *path
    clog_path: 
    data_path: 
    log_path:
    topo: "1" # "1:1:1"
    proxy_num: 0 
    sys_params:
      devname: lo 
      memory_limit: 1G
      cpu_count: 16
      datafile_size: 10G
      log_disk_size: 10G
      _cache_wash_interval: 100ms
    preloads:
      - libhacksysconf.so
    envs:
      HACK_SC_NPROCESSORS_CONF: 96
      HACK_SC_NPROCESSORS_ONLN: 8  # 8C
      HACK_SC_PHYS_PAGES: 18874368 # 72G
  tenants:
    sys:
      min_cpu: 2.5
      max_cpu: 5
      memory_size: 1G
      log_disk_size: 10G
cases:
  mem_hold_basic:
    owner: nijia.nj
    comment: check server hold 
    conn_tenant: sys
    input:
      unstable_mod:
        - CACHE_MAP_NODE
        - MEMTABLE_ARENA
        - MysqlRequesReco
        - TX_DATA_SLICE
        - MrgMemPoolChk
        - PlJit
    cmp_metrics:
      - metric: hold
        value: 297,990,368
        u_threshold: 50,000,000
      - metric: hold_unstable
        value: 15,958,016
        u_threshold: 50,000,000
      - metric: unmanaged_memory_size
        value: 1,941,504
        u_threshold: 2,000,000
  check_global_variables:
    owner: nijia.nj 
    comment: check global variable
    conn_tenant: sys
    cmp_metrics:
      - metric: hold_total
        value: 14,177,672
        u_threshold: 1,000,000
  check_thread_local:
    owner: nijia.nj
    comment: check thread local variables
    conn_tenant: sys
    cmp_metrics:
      - metric: hold_total
        value: 146,449
        u_threshold: 8,000
