oceanbase:
  style: cluster
  name: obcluter
  id: 1
  zones:
    z1:
      idc: zone1
      servers:
        - name: s1
          ip: 127.0.0.1 
        - name: s2
          ip: 127.0.0.1
      config:
        s1:
          mysql_port: SERVER_1_SQL_PORT
          rpc_port: SERVER_1_RPC_PORT
          home_path: HOME_PATH_OBSERVER_1
        s2:
          mysql_port: SERVER_2_SQL_PORT
          rpc_port: SERVER_2_RPC_PORT
          home_path: HOME_PATH_OBSERVER_2
    z2:
      idc: zone2
      servers:
        - name: s3
          ip: 127.0.0.1
        - name: s4
          ip: 127.0.0.1
      config:
        s3:
          mysql_port: SERVER_3_SQL_PORT
          rpc_port: SERVER_3_RPC_PORT
          home_path: HOME_PATH_OBSERVER_3
        s4:
          mysql_port: SERVER_4_SQL_PORT
          rpc_port: SERVER_4_RPC_PORT
          home_path: HOME_PATH_OBSERVER_4
  config:
    devname: lo
    memory_limit: 80G
    log_disk_size: 100G
    system_memory: 10G
    datafile_size: 150G
    __min_full_resource_pool_memory: "4294967296"
obproxy:
  style: default
  depends:
  - oceanbase
  servers:
    - 127.0.0.1
  global:
    home_path: HOME_PATH_OBPROXY
    listen_port: OBPROXY_PORT
    prometheus_listen_port: OBPROXY_PRO_PORT
    enable_cluster_checkout: false
    skip_proxy_sys_private_check: true
    enable_strict_kernel_release: false
