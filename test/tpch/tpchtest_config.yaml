  farm2_with_optimize:
    disable-transfer: false
    obclient-bin: "{{base_dir}}/tools/deploy/obclient"
    optimize_oceanbase_stage_test_sql_file: "{{base_dir}}/test/tpch/tpch_optimize.sql"