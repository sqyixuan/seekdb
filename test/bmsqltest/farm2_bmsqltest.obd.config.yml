user:
  username: DEFAULT_USER
  key_file: OBSERVER_KEY_FILE
ssh_configs:
  test1:
    username: OBSERVER_1_USER
    key_file: OBSERVER_KEY_FILE
  test2:
    username: OBSERVER_2_USER
    key_file: OBSERVER_KEY_FILE
  test3:
    username: OBSERVER_3_USER
    key_file: OBSERVER_KEY_FILE
oceanbase:
  style: cluster
  name: obcluter
  id: 1
  zones:
    z1:
      idc: zone1
      servers:
        - name: s1
          ip: LOCAL_HOST
          ssh_config_selector: test1
      config:
        s1:
          mysql_port: SERVER_1_SQL_PORT
          rpc_port: SERVER_1_RPC_PORT
          home_path: HOME_PATH_OBSERVER_1
    z2:
      idc: zone2
      servers:
        - name: s2
          ip: LOCAL_HOST
          ssh_config_selector: test2
      config:
        s2:
          mysql_port: SERVER_2_SQL_PORT
          rpc_port: SERVER_2_RPC_PORT
          home_path: HOME_PATH_OBSERVER_2
    z3:
      idc: zone3
      servers:
        - name: s3
          ip: LOCAL_HOST
          ssh_config_selector: test3
      config:
        s3:
          mysql_port: SERVER_3_SQL_PORT
          rpc_port: SERVER_3_RPC_PORT
          home_path: HOME_PATH_OBSERVER_3
  config:
    devname: lo
    # mysql_port: 2881
    # rpc_port: 2882
    memory_limit: 56G
    log_disk_size: 68G
    system_memory: 2G
    datafile_size: 250G
    __min_full_resource_pool_memory: "4294967296"
obproxy:
  style: default
  depends:
  - oceanbase
  servers:
    - LOCAL_HOST
  global:
    home_path: HOME_PATH_OBPROXY
    listen_port: OBPROXY_PORT
    prometheus_listen_port: OBPROXY_PRO_PORT
    enable_cluster_checkout: false
    skip_proxy_sys_private_check: true
    enable_strict_kernel_release: false

