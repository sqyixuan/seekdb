oceanbase:
  style: cluster
  name: obcluter
  id: 1
  zones:
    z1:
      idc: zone1
      servers:
        - name: s1
          ip: 127.0.0.1 
      config:
        s1:
          mysql_port: SERVER_1_SQL_PORT
          rpc_port: SERVER_1_RPC_PORT
          home_path: HOME_PATH_OBSERVER_1
  config:
    devname: lo
    # mysql_port: 2881
    # rpc_port: 2882
    memory_limit: 8G
    log_disk_size: 48G
    system_memory: 3G
    datafile_size: 250G
