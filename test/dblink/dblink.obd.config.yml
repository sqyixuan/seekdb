oceanbase:
  style: cluster
  name: obcluter
  id: 1
  zones:
    z1:
      idc: zone1
      servers:
        - name: s1
          ip: 127.0.0.1 
      config:
        s1:
          mysql_port: SERVER_1_SQL_PORT
          rpc_port: SERVER_1_RPC_PORT
          home_path: HOME_PATH_OBSERVER_1
    z2:
      idc: zone2
      servers:
        - name: s2
          ip: 127.0.0.1
      config:
        s2:
          mysql_port: SERVER_2_SQL_PORT
          rpc_port: SERVER_2_RPC_PORT
          home_path: HOME_PATH_OBSERVER_2
    z3:
      idc: zone3
      servers:
        - name: s3
          ip: 127.0.0.1
      config:
        s3:
          mysql_port: SERVER_3_SQL_PORT
          rpc_port: SERVER_3_RPC_PORT
          home_path: HOME_PATH_OBSERVER_3
  config:
    devname: lo
    # mysql_port: 2881
    # rpc_port: 2882
    memory_limit: 56G
    log_disk_size: 200G
    system_memory: 10G
    datafile_size: 200G
    __min_full_resource_pool_memory: "4294967296"
  runtime_dependencies:
    - src_path: plugin_dir
      target_path: plugin_dir
    - src_path: admin
      target_path: admin
    - src_path: lib
      target_path: lib
    - src_path: tools
      target_path: tools
    - src_path: etc
      target_path: etc
    - src_path: wallet
      target_path: wallet
obproxy:
  style: default
  depends:
  - oceanbase
  servers:
    - 127.0.0.1
  global:
    home_path: HOME_PATH_OBPROXY
    listen_port: OBPROXY_PORT
    prometheus_listen_port: OBPROXY_PRO_PORT
    enable_cluster_checkout: false
    skip_proxy_sys_private_check: true
    enable_strict_kernel_release: false
